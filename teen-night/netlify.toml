# netlify.toml — Netlify configuration

[build]
  publish = "public"          # your static files live here
  functions = "netlify/functions"  # serverless functions live here

[functions]
  node_bundler = "esbuild"    # fast bundler that supports ES modules

# Redirect all /api/* calls to the Netlify functions
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200
